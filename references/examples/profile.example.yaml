# VC Report Profile 示例
# 此文件由风格学习流程自动生成，用户可手动修改

# 基本信息
name: "Alice"
role: "VC 投资人"
firm: "某基金"

# 关注领域
domain: "AI 软件"
focus_areas:
  - "AI 社交"
  - "AI 游戏"
  - "AI Memory"
  - "端侧模型"

# 报告风格（从样本中学习得到）
report_style:
  # 结构模板 — 板块名称、顺序、层级均从用户样本中学习，以下仅为示例
  structure:
    - section: "Portfolio Updates"
      description: "已投项目的本周进展"
    - section: "Market Scan"
      description: "行业调研和趋势观察"
    - section: "Watchlist"
      description: "值得持续关注的项目/方向"
    - section: "Reads"
      description: "本周有价值的文章和论文"

  # 语言风格
  tone:
    - "中英文混用，专业术语用英文（如 DAU、ARR、portfolio）"
    - "带个人判断和情绪"
    - "数据尽量精确"
    - "投资视角：关注商业化路径、融资轮次、竞争壁垒"

  # 信息粒度 — key 对应 structure 中的板块名，从样本学习填充
  detail_level:
    portfolio_updates: "每个项目 2-3 行，关注数据变化和里程碑"
    market_scan: "每个话题 1-3 个子要点，侧重关键发现和判断"
    watchlist: "一行一条，标注关注理由"
    reads: "标题 + URL，一行一个"

  # 风格参考片段（从用户样本中摘取的典型表达，以下为示例）
  sample_snippets:
    - "产品上线三个月，DAU 从 2w 涨到 12w，但留存只有 15%，商业化还没跑通"
    - "团队就 4 个人，月 burn 不到 5w 刀，是同阶段里最省的"
    - "这个方向大家都在做，但还没有谁真正把体验做到位"

# 深度调研风格（单个产品/公司的详细分析报告）
deep_research_style:
  structure:
    - "开头：产品名 + 关键词标签 + 一句话定位（含关键数据）"
    - "产品分析：长什么样 — 核心玩法到功能演进"
    - "定位/趋势分析：为什么这样做 — 结合行业背景的判断"
  writing_style:
    - "产品名用「」包裹"
    - "竞品对比自然穿插在分析中，而非单独列表"
    - "分析段带强判断和归因"
    - "功能描述具体但不啰嗦：一句话说清是什么 + 亮点"

# 录音加工风格（从会议纪要样本中学习得到）
# 注意：记录的是用户的倾向和习惯，不是硬性规定。Agent 应根据具体会议性质灵活调整。
audio_processing_style:
  learned_from: "路演记录 + 行业交流会议纪要"

  organization_tendencies:
    - "倾向按议题分块，每个议题含背景 + 关键讨论 + 结论"
    - "开头列参会人角色和姓名"

  information_tendencies:
    - "偏好精选保留关键原话（数据承诺、分歧观点、独到判断）"
    - "关键数据精确保留，不接受模糊描述"
    - "分析穿插在记录中，用括号旁注关键判断"
    - "说话人标注角色而非全名"

  sample_snippets:
    - "创始人提到 DAU 目前 50w（但没说口径，需确认是否含回流），月增长 15%，年底目标 200w"
    - "团队对 B 端需求的判断比较乐观（「企业客户愿意为定制化付费」），但目前还没有签约案例佐证"

# 调研偏好（阶段 2 和 output 生成时加载，不在阶段 1 注入）
research_preferences:
  perspective: "投资视角，关注战略含义而非技术细节"
  focus:
    - "市场机会：这个东西意味着什么新机会？谁会受益？"
    - "竞争格局变化：现有玩家会怎样？新进入者有什么优势？"
    - "对已关注赛道/项目的影响"
    - "商业化路径：怎么赚钱？模式是否成立？"
  avoid:
    - "不要堆砌 benchmark 数据——数据只作为判断的佐证"
    - "不要过度展开技术实现细节——除非技术路线本身是壁垒"
    - "不要罗列功能清单——说清核心差异化就够"
  data_citation: "关键数据点必须用脚注标注来源 URL"

# 输出格式
output_format: "markdown"
